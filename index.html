<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Für dich</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(to bottom, #ffecd2, #fcb69f);
      color: #333;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      max-width: 90%;
      text-align: center;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #ff7b54;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background-color: #e8643a;
    }

    footer {
      position: fixed;
      bottom: 10px;
      font-size: 0.8rem;
      text-align: center;
      color: #555;
    }

    #countdown {
      font-size: 1.5rem;
      margin: 20px 0;
      font-weight: bold;
    }

    #known-time {
      font-size: 1rem;
      margin-top: 10px;
      color: #555;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1.2rem;
      }

      p {
        font-size: 0.9rem;
      }

      .btn {
        font-size: 0.9rem;
      }

      #countdown {
        font-size: 1.2rem;
      }

      #known-time {
        font-size: 0.9rem;
      }
    }
  </style>
  <script>
    function updateCountdown() {
      const birthday = new Date("2025-06-12T00:00:00");
      const firstMet = new Date("2024-06-28T00:00:00");
      const now = new Date();
      const diff = birthday - now;

      const countdown = document.getElementById("countdown");
      const knownTime = document.getElementById("known-time");

      if (diff <= 0) {
        countdown.innerText = "Es ist ihr Geburtstag! 🎉";
      } else {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        countdown.innerText = `${days} Tage, ${hours} Stunden, ${minutes} Minuten, ${seconds} Sekunden`;
      }

      const totalMonths = (now.getFullYear() - firstMet.getFullYear()) * 12 + (now.getMonth() - firstMet.getMonth());
      const totalDays = now.getDate() >= firstMet.getDate() ? 0 : -1;
      knownTime.innerText = `Wir kennen uns jetzt seit ${totalMonths + totalDays} Monaten.`;
    }

    setInterval(updateCountdown, 1000);
  </script>
</head>

<body>
  <h1>Noch ...</h1>
  <div id="countdown">Lade Countdown...</div>
  <div id="known-time">Lade Zeit...</div>
</body>

</html>
